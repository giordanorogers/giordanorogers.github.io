                    <h2><a href="https://antirez.com/news/142">First Token Cutoff LLM sampling</a></h2>
                    <address></address>
                    <small><a href="0#down" class="downarrow disabled">&#9660;</a></small>
                    <topcomment>
                        <article class="comment" style="margin-left:0px" data-comment-id="142-" id="142-">
                            <span class="info"><span class="username"><a href="https://antirez.com/user/antirez">antirez</a></span> 342 days ago.</span>
                            <pre>From a theoretical standpoint, the best reply provided by an LLM is obtained by always picking the token associated with the highest probability. This approach makes the LLM output deterministic, which is not a good property for a number of applications. For this reason, in order to balance LLMs creativity while preserving adherence to the context, different sampling algorithms have been proposed in recent years.

Today one of the most used ones, more or less the default, is called top-p: it is a form of nucleus sampling where top-scoring tokens are collected up to a total probability sum of “p”, then random weighted sampling is performed.</pre>
                        </article>

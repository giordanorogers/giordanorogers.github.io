## Personal Semantic Embeddings

*September 29, 2024*

> "...he listened eagerly to the story of her life and she was equally eager to hear the story of his, but although they had a clear understanding of the logical meaning of the words they exchanged, they failed to hear the semantic murmurs of the river flowing through them."
> 
> — Milan Kundera, *The Unbearable Lightness of Being*

My favorite exploration of conversational disconnect comes from a section of Milan Kundera's The Unbearable Lightness of Being. In this passage, he describes the semantic gap between two lovers—Franz and Sabina. Their experiences have led them each to make strong associations with words and concepts. And the differences in these associations drive their dialogue apart, as if they were speaking entirely different languages altogether. Like Kundera's lovers, we all accumulate experiences which individuate how we use language. We bind our words to our memories. Maybe for you the word "basketball" evokes memories of an NBA playoff run you enjoyed watching with friends. For another, it may evoke the shame of an air-balled free throw from his middle-school season, the reverberating slap of ball on vinyl court. These ingrained word associations give language its poetic flavor. But they are also baggage which clouds our understanding, and inhibits us from being fully understood.

Many great thinkers have attempted to quantify and clarify the meaning of speech. Perspectives on this matter are divided. Some have argued that language can only be understood as a biological phenomenon. Others argue that trying to define meaning creates a never ending chain of questions. But recent advancements in large language models (LLMs) have called these arguments into question. Google Translate, Microsoft CoPilot, and ChatGPT are well-known names. And they all convert our seemingly nebulous word associations into good-old reliable math. LLMs analyze how often words appear together in text, converting each word into a long list of numbers—a vector—that places it in a high-dimensional space relative to other words. We call this space an embedding space<sup>[[1]](https://doi.org/10.48550/arXiv.1310.4546)</sup>. Converting words to numbers lets us do all kinds of interesting things like translate and generate coherent text and speech. As this technology has matured, we've seen massive adoption of language models for writing assistance. A 2023 survey found that 56% of college students reported using AI to assist in their coursework<sup>[[2]](https://www.bestcolleges.com/research/most-college-students-have-used-ai-survey/)</sup>. Emphasis on "reported". Considering that use of these tools is stigmatized, actual rates are likely higher.

What's more is that, unlike what was previously thought to be the case with language, the word relations latent to these embedding spaces have arithmetic and geometric properties. In a famous study, a team of researchers found that by subtracting the vector for "man" from "king", one arrived at a vector most closely approximating that for "queen"<sup>[[3]](https://doi.org/10.48550/arXiv.1509.01692)</sup>. Since then, all kinds of interesting artifacts have been discovered in embedding spaces, such as representations of functional relationships like "x is the capital of y"<sup>[[4]](https://aclanthology.org/D17-1308/)</sup> and the ability to delete whole concepts from an embedding space while leaving the rest of the conceptual relations intact<sup>[[5]](https://doi.org/10.48550/arXiv.2308.14761)</sup>. This is significant because it highlights the underlying structure and regularity of meaning within language, suggesting that these spaces encode not just word associations but deeper conceptual relationships.

But despite mass-adoption, there is still a critical issue with language models today – their text comes across as robotic. There's a generality-by-nature to the process by which these models are typically trained—i.e. processing terabytes of data from the worldwide web. This generality is ideal when training a language model to understand the semantics of common English. But by that same token the relations it learns are different from those of any particular human's vocabulary. Whereas human semantics all have various idiosyncrasies shaped by the unique and nuanced experiences of our lives, broad sampling of internet text leads to a model which lacks distinction—the very thing which gives language its humanity. In most respects this is desirable. Because it learns a maximally general representation of the language, prompting a language model to behave in a certain way can evoke more specialized behavior. Meanwhile the underlying embedding space remains the same.

But the process of fine-tuning lets us augment these embedding spaces with new data. We take a large language model which has already learned the language itself in this large sampling process, and then we augment it with some new, personal data so that it changes its representations to better reflect the co-occurrence of words in the new data. In this way, with enough data, we can fine-tune the mathematical representations of language models to reflect not just English broadly, but specifically our language, the semantics that we've learned over time and that act as a sort of unique cognitive fingerprint which reflects us and only us. The underlying structure it extracts from language reveals information that can greatly aid our ability to connect and communicate. As we shift from general language models as the standard, to more personalized models, fine-tuned to reflect the nuances of our own use of language, we will no longer just make machines understand us better—we'll understand each other better, too.

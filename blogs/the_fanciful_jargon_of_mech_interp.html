## Your Blog Post Title

*April 5th, 2025*

---

Mech interp is an awesome subfield of AI research and easily the area I find most interesting right now.
This blog is **not** meant to be a hitpiece on mech interp or anyone in it.
More than anything, it is a way for me to engage with a lot of the common jargon in the field.
One confounding factor in a lot of areas, and especially in STEM, is that there's a lot of terms that people use because they've just always used them but they don't actually bring much clarity to the concept.
For example, I think the term "Gaussian distribution" sounds magical and cool and way less boring than "Normal distribution".
But I also know who Carl Friedrich Gauss is. I respect him as a mathematician. I think he has a cool sounding name.
But that doesn't outshine the fact that "Normal distribution" intrinsically makes way more sense.
It's intuitive explanation is really easy to comprehend.
In the limit, things normally tend to distribute in this way.
There's a lot of other terms in math and physics that are confounded by the use of attribution-based terminology rather than functional terminology.
In mech interp it's a bit different.
The field is still young enough, and no one is so far bold enough, that nothing is really named after someone.
In contrast, a lot of things are just named to sound magical and exciting.
But in the same way the acutal functional reality of what is going on gets obscured under an ornate layer of mysticism.
My hope is that this blog will demystify some of these concepts for myself and for others.
They say a problem well-stated is a problem half-solved.
So if the goal is to develop safe superintelligent systems, it's important that we're not deluding ourselves by baking in false intuitions because of confounding jargon.

## Mechanistic interpretability

Let's start with the name of the field itself. I actually think this is a pretty good name. I don't take much issue with it. But it does try to draw a distinction between itself and the broader field of Interpretability, that seems to exist more in thoery than in practice. For example, Google DeepMind and Antrhtopic just call their mech interp teams their interpretability teams **FACT CHECK!**. A more direct name might just be Artificial Neural Network Interpretability. But that's even more of a mouthful. Mechanistic Interpretability is fine in my book. We're trying to interpret the machanisms that underlie the power of aritifical neural networks via causal interventions that hopefully allow us to reverse angineering their representations.

## Superposition --> Feature Overlap

The superposition Antropic writes about in their Toy Models of Superposition paper is not the same thing as how a quantum system exists in multiple states until observed. There is some conceptual similarity there, but the mathematics are different. And this means whatever similarity the two ideas do share can make the whole onboarding to understanding that much more confusing for newbies. What the term superposition describes is a phenomenon where neurons in a network encode more features than they have directions. So the feature vectors get stored almost orthogonally, and the neuron activates for multiple semantically distinct inputs.

I think the term "Feature Overlap" is more clear here. Instead of being able to easily decode the representation contained in a neuron, we have to deal with the noise introduced by the too-many features being stuffed into the neuron's representation space.

## Induction Heads --> Last-time Heads

The classic example of logical induction is the term:
"All the swans I've seen are white, therefore all swans are white."
Formal mathematical induction follows a similar concept:
"If a statement is true for a given integer n, and for each subsequent integer n+1, then the statement is true for all integers."

It's important to understand that this is not what the concept of induction heads is intended to convey. An induction head is just an attention head that activates for previous occurrences of a given token in the context. The term last-time heads is more precise. It's not that induction heads are used for any inductive operations going on in the model. Their utility is that they can draw what happened last time this particualr token appeared into attention.

Core to the distinction I'm making here is that this is different from the principle of mathematical induction. Induction is supposed to hold for all steps in a sequence. If last-time heads always resulted in mimciing the behavior of what came after the last occurrence of a given token, transformers would *lose* alot of their generalization power and become overly repetitive. So when you see the term induction head, don't get it misconstrued. The model isn't doing any form of inductive reasoning. It's just raising it's attention on the last-time this token appeared in context, and what token followed it.

I want to say that I hope none of the above did anything to dilute the joy of mech interp research. This truly is an exciting and stimulating field to learn, and participate in. But it is my strong conviction that precision with our words will help the field accelerate toward our goal quicker. It helps beginners intuit the research landscape faster, and it helps experienced researchers avoid adopting logical fallacies propelled by the repeated use of imprecise slang.

If anyone reading this has any disagreements with the faults I find in established terms, or can thing of any improvements to the suggestions I've made, please email me! The goal of this is to bring clarity to my and your thinking, not to boast that I can come up with better names for things. If you find fault in my thinking on any of these ideas, I welcome any and all contrasting takes.

## Writing as Compression-Perplexity Optimization

*April 15th, 2025*

Good writing is surprising and resonant. It threads the familiar with the unfamiliar to become the first of a kind. Think of the process. Scrolling through sources, dumping scattered thoughts, the reflections, the revisions, the serendipity of everyday life. What is distilled throughout surfaces in a work, and rings true.

Of course, novelty and clarity are subjective, and contextual. Today we find general relativity and genetic adaptation intuitive. In very little time, a shocking truth becomes the new normal. So it is the delightful burden of the writer to tread new soil in the landscape of thought.

We can view a sentence as a probabilistic sequence, updating in the reader’s mind with each new word. Take the sentence: “Today my dog ate chocolate, and I had to take her to the—“. Your mental language model may predict “vet”, “hospital”, or even “cemetery”. If instead the sentence were to continue: “Today my dog ate chocolate, and I had to take her to the candy store because—”, your surprise spikes. You’ve seen more sentences akin to your initial prediction than to this continuation. But now let the sentence proceed with: “Today my dog ate chocolate, and I had to take her to the candy store because she wouldn’t stop begging for more.” Your degree of surprise falls. “—she wouldn’t stop begging for more.” is not so novel a continuation, once you’ve seen the prior sequence. The sentence returns to a reasonable degree of predictability.

Information theory lets us quantify this surprise with a perplexity score. In practice, perplexity is commonly used as a way to measure the quality of a language model. If we witness high perplexity as a language model processes a sequence of words, we may deem its representation of the language as poor. As people, we possess mental language models, formed by our history and cultural exposure. And if the reward model of the knowledge-hungry reader is the ability to predict, and therefore prove her command over, a body of work, then perplexity provides a useful framing for the value proposition we as writers offer our curious audience. This novelty, this unpredictability, this perplexity, is what the reader craves.

But perplexity alone could never be the sole goal of good writing. It is trivial to hack. Imagine me sitting at the keyboard mashing the sequence: “afjdik fetoq fhweiula fhsk—“. You have no way of predicting what will come next, other than that it is likely to start with an “f” due to an artifact of my button mashing. Randomness maximizes surprise but lacks coherence or purpose. It communicates nothing.

Surprising writing cannot simply be random. It needs meaning. The antipode of such randomness is an information signal. And to this end, useful exposition is data compression. Reading an article instead of its references is motivated by time and space efficiency. We want to save time. And we may enjoy the author’s method of organizing information and conveying the essential. This extends to many kinds of writing. Bloggers synthesize centroids of idea space into cogent representations. Autobiographers translate decades of perception into pages of text. Fiction authors compress sporadic daydreams into structured narratives. Each has its own compression logic and optimal perplexity range given its intended audience.

Verbatim copies of source material are, at best, aggregation, and at worst plagiarism—or personal confession for the autobiographer and the fiction author. Contrasted with perplexing compression, you have the unfortunate hallmark of many dispassionate high-school essays—drab oscillation between quotations and their paraphrase. 

The skillful author encodes his prose with the essence of every reference. And the reader delights in his artful modulation between the clear and the perplexing. Crucially, this quality is insufficient for great writing, but it’s probably necessary for a piece to be good or, at the very least, not redundant.
